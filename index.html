<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Loader</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230f1729'/%3E%3Ctext x='16' y='26' text-anchor='middle' font-family='Segoe UI Symbol, serif' font-size='28' fill='%23b8893c'%3E⌬%3C/text%3E%3C/svg%3E" />
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b1020;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
    }

    .box {
      width: 320px;
      padding: 24px;
      border-radius: 12px;
      background: #111827;
      box-shadow: 0 10px 30px rgba(0,0,0,.45);
      text-align: center;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #0f172a;
      color: white;
      font-size: 14px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: 0;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #status {
      margin-top: 12px;
      color: #fca5a5;
      min-height: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>⌬ Secure Dashboard</h1>

  <input type="password" id="password" placeholder="Enter password" />

  <button onclick="unlock()">Unlock</button>

  <div id="status"></div>
</div>

<script>
async function unlock() {
  const password = document.getElementById('password').value;
  const status = document.getElementById('status');

  if (!password) {
    status.textContent = 'Enter a password';
    return;
  }

  status.textContent = 'Decrypting...';

  try {
    // Load encrypted file
    const response = await fetch('secure.enc');
    const data = await response.json();

    // Base64 helpers
    const b64 = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));

    const salt = b64(data.salt);
    const nonce = b64(data.nonce);
    const ciphertext = b64(data.ciphertext);

    // Derive key
    const keyMaterial = await crypto.subtle.importKey(
      'raw',
      new TextEncoder().encode(password),
      'PBKDF2',
      false,
      ['deriveKey']
    );

    const key = await crypto.subtle.deriveKey(
      {
        name: 'PBKDF2',
        salt,
        iterations: data.iterations,
        hash: 'SHA-256'
      },
      keyMaterial,
      {
        name: 'AES-GCM',
        length: 256
      },
      false,
      ['decrypt']
    );

    // Decrypt
    const decrypted = await crypto.subtle.decrypt(
      {
        name: 'AES-GCM',
        iv: nonce
      },
      key,
      ciphertext
    );

    const html = new TextDecoder().decode(decrypted);

    // Replace loader with decrypted HTML
    document.open();
    document.write(html);
    document.close();

  } catch (err) {
    console.error(err);
    status.textContent = 'Wrong password or corrupted file';
  }
}

// Allow Enter key
document.getElementById('password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') unlock();
});
</script>

</body>
</html>
